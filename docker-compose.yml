services:
  api:
    build: .
    container_name: ukraine_trip_api
    ports:
      - "8000:8000"
    volumes:
      - .:/app  # Це дозволить оновлювати код без перезапуску контейнера!
    env_file:
      - .env
    depends_on:
      - db

  adminer:
    image: adminer
    container_name: ukraine_trip_adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db
  db:
    image: postgres:16-alpine
    container_name: ukraine_trip_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: ukraine_trip_api
    volumes:
      - .:/code
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

volumes:
  postgres_data:

